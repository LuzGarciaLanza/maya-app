<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0a1628" />
  <title>MAYA — Redeem Code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1628;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #0d2137;
      border: 1px solid rgba(0,172,193,0.2);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }

    .logo { font-size: 36px; margin-bottom: 8px; }
    .title {
      font-family: Georgia, serif;
      font-size: 22px;
      font-weight: bold;
      background: linear-gradient(135deg, #80DEEA, #26C6DA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      margin-bottom: 28px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(0,172,193,0.3);
      border-radius: 12px;
      color: #FFD54F;
      font-family: monospace;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      padding: 14px 16px;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: rgba(0,172,193,0.7); }
    input::placeholder { color: rgba(255,255,255,0.15); font-size: 14px; letter-spacing: 1px; }

    button {
      width: 100%;
      background: linear-gradient(135deg, #00897B, #00ACC1);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-weight: bold;
      padding: 14px;
      cursor: pointer;
      font-family: Arial;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: default; }

    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }
    .result.success {
      background: rgba(0,137,123,0.15);
      border: 1px solid rgba(0,172,193,0.4);
      color: #80DEEA;
      display: block;
    }
    .result.error {
      background: rgba(255,82,82,0.1);
      border: 1px solid rgba(255,82,82,0.3);
      color: #ff8a80;
      display: block;
    }
    .result.warning {
      background: rgba(255,160,0,0.1);
      border: 1px solid rgba(255,160,0,0.3);
      color: #FFD54F;
      display: block;
    }

    .result-icon { font-size: 32px; margin-bottom: 8px; }
    .result-title { font-size: 15px; font-weight: bold; margin-bottom: 6px; }

    .footer {
      margin-top: 28px;
      font-size: 10px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">🌴</div>
  <div class="title">MAYA</div>
  <div class="subtitle">PARTNER REDEMPTION</div>

  <label>Customer discount code</label>
  <input
    id="codeInput"
    type="text"
    placeholder="MAYA-FOGON-A3K7"
    maxlength="20"
    oninput="this.value = this.value.toUpperCase()"
    onkeydown="if(event.key==='Enter') redeemCode()"
  />

  <button id="redeemBtn" onclick="redeemCode()">
    ✅ Verify & Redeem
  </button>

  <div id="result" class="result"></div>
</div>

<div class="footer">MAYA · Partner Portal · holamaya.lat</div>

<script>
  async function redeemCode() {
    const code = document.getElementById('codeInput').value.trim();
    const btn = document.getElementById('redeemBtn');
    const result = document.getElementById('result');

    if (!code || code.length < 6) {
      showResult('error', '⚠️', 'Invalid code', 'Please enter a valid MAYA code.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Checking...';
    result.className = 'result';
    result.style.display = '';

    try {
      const res = await fetch('/api/redeem-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });
      const data = await res.json();

      if (res.status === 200) {
        showResult(
          'success',
          '✅',
          'Discount redeemed!',
          `Code <strong>${code}</strong> has been validated for <strong>${data.partner_name}</strong>.<br><br>Apply the discount to this customer now.`
        );
        document.getElementById('codeInput').value = '';
      } else if (res.status === 404) {
        showResult('error', '❌', 'Code not found', `The code <strong>${code}</strong> does not exist. Make sure the customer is showing you their MAYA app code.`);
      } else if (res.status === 409) {
        const date = data.redeemed_at ? new Date(data.redeemed_at).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'earlier';
        showResult('warning', '⚠️', 'Already redeemed', `This code was already used on <strong>${date}</strong>. Each code can only be redeemed once.`);
      } else {
        showResult('error', '❌', 'Error', 'Something went wrong. Please try again.');
      }
    } catch (e) {
      showResult('error', '❌', 'Connection error', 'Could not connect. Check your internet and try again.');
    }

    btn.disabled = false;
    btn.textContent = '✅ Verify & Redeem';
  }

  function showResult(type, icon, title, message) {
    const result = document.getElementById('result');
    result.className = `result ${type}`;
    result.style.display = 'block';
    result.innerHTML = `<div class="result-icon">${icon}</div><div class="result-title">${title}</div><div>${message}</div>`;
  }
</script>
</body>
</html>
